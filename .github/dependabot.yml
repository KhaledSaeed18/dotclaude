version: 2
updates:
  # Dev dependencies (Dependabot reads the pnpm lockfile via the npm ecosystem).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  # Keep the GitHub Actions used in workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
