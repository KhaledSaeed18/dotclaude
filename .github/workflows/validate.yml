name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Check generated files are in sync
        run: pnpm gen:check

      - name: Validate registry
        run: pnpm validate

      - name: Validate plugin marketplace
        # Pinned so CI never executes an unreviewed release; bump deliberately.
        run: npx --yes @anthropic-ai/claude-code@2.1.201 plugin validate .
